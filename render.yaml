services:
  - type: web
    name: meta-ads-agent-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx tsc
    startCommand: npx prisma db push --accept-data-loss && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: meta-ads-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: META_MCP_URL
        sync: false
      - key: PIPEBOARD_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

databases:
  - name: meta-ads-db
    databaseName: metaads
    user: metaads
